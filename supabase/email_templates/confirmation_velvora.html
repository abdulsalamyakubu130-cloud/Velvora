<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>__APP_NAME__ Verification Code</title>
  </head>
  <body style="margin:0;padding:0;background:#f6fbf7;font-family:Segoe UI,Arial,sans-serif;color:#13221a;">
    <table role="presentation" cellpadding="0" cellspacing="0" width="100%" style="padding:24px 12px;">
      <tr>
        <td align="center">
          <table role="presentation" cellpadding="0" cellspacing="0" width="100%" style="max-width:560px;background:#ffffff;border:1px solid #d9e8dd;border-radius:16px;">
            <tr>
              <td style="padding:28px 24px 12px 24px;text-align:center;">
                <img src="__LOGO_URL__" alt="__APP_NAME__ logo" width="44" height="44" style="display:block;margin:0 auto 10px auto;border-radius:999px;" />
                <h1 style="margin:0;font-size:22px;line-height:1.3;color:#13221a;">__APP_NAME__</h1>
              </td>
            </tr>
            <tr>
              <td style="padding:8px 24px 24px 24px;">
                <p style="margin:0 0 10px 0;font-size:14px;line-height:1.6;color:#5d6b62;">Use this verification code to confirm your email address:</p>
                <div style="margin:0 0 16px 0;padding:14px 16px;border-radius:12px;background:#e6f5eb;border:1px solid #d9e8dd;text-align:center;">
                  <span style="font-size:28px;letter-spacing:6px;font-weight:700;color:#165737;">{{ .Token }}</span>
                </div>
                <p style="margin:0 0 18px 0;font-size:13px;line-height:1.6;color:#5d6b62;">This code expires soon. If you did not request this, you can ignore this email.</p>
                <p style="margin:0 0 16px 0;">
                  <a
                    href="{{ .ConfirmationURL }}"
                    style="display:inline-block;background:#237b4b;color:#ffffff;text-decoration:none;padding:10px 16px;border-radius:999px;font-size:13px;font-weight:600;"
                  >
                    Verify Email
                  </a>
                </p>
                <p style="margin:0;font-size:12px;line-height:1.6;color:#5d6b62;">Sent by __APP_NAME__</p>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
